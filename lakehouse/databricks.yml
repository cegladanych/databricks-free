# This is a Databricks asset bundle definition for lakehouse.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: lakehouse
  uuid: 0c5ffbfb-f0dd-4a54-8c0c-08e26ded7342

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-016c7e43-b9b5.cloud.databricks.com
    variables:
      catalog: lakehouse
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-016c7e43-b9b5.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/krzysiek@cegladanych.pl to make sure we only have a single copy.
      root_path: /Workspace/Users/krzysiek@cegladanych.pl/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: lakehouse
      schema: prod
    permissions:
      - user_name: krzysiek@cegladanych.pl
        level: CAN_MANAGE
